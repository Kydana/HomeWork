      </ul>
      <div class="add-form">
        <input
          type="text"
          class="add-form-name"
          placeholder="Введите ваше имя"
        />
        <textarea
          type="textarea"
          class="add-form-text"
          placeholder="Введите ваш коментарий"
          rows="4"
        ></textarea>
        <div class="add-form-row">
          <button class="add-form-button">Написать</button>
        </div>
      </div>
    </div>
</body>

<script>

    const input = document.querySelector(".add-form-name");
    const textarea = document.querySelector(".add-form-text");

    const sanitizeHtml = (value) => {
        return value.replaceAll("<", "&lt;").replaceAll(">", "&lt;");
    }

    const comments = [
        {
            name: "Глеб Фокин",
            date: new Date(),
            text: "Это будет первый комментарий на этой странице",
            likes: 3,
            isLiked: false,
        },
        {
            name: "Варвара Н",
            date: new Date(),
            text: "Мне нравится как оформлена эта страница! ❤",
            likes: 75,
            isLiked: true,
        }
    ];

    const renderComments = () => {
        const list = document.querySelector(".comments");

        list.innerHTML = comments.map((comment, index) => {
            return `
                <li class="comment" data-index="${index}">
                <div class="comment-header">
                    <div>${comment.name}</div>
                    <div>${comment.date.toLocaleDateString()}</div>
                </div>
                <div class="comment-body">
                    <div class="comment-text">
                        ${comment.text}
                    </div>
                </div>
                <div class="comment-footer">
                    <div class="likes">
                        <span class="likes-counter">${comment.likes}</span>
                        <button data-index="${index}" class="like-button ${comment.isLiked ? "-active-like" : ""}"></button>
                    </div>
                </div>
            </li>
            `;
        })
        .join("");

        const likeButtons = document.querySelectorAll(".like-button");

        for (const likeButton of likeButtons) {
            likeButton.addEventListener("click", (event) => {
                event.stopPropagation();

                const index = likeButton.dataset.index;
                const comment = comments[index];

                comment.likes = comment.isLiked ? comment.likes - 1 : comment.likes + 1;

                comment.isLiked = !comment.isLiked;

                renderComments();
            });
        }

        const commentsElements = document.querySelectorAll(".comment");

        for (const commentElement of commentsElements) {
            commentElement.addEventListener("click", () => {
                const currentComment = comments [commentElement.dataset.index];
                textarea.value = `${currentComment.name}: ${currentComment.text}`;
            });
        }
    };

    renderComments();

    const button = document.querySelector(".add-form-button");

    button.addEventListener("click", () => {
        if (!input.value  || !textarea.value) {
            return;
        }

        const newComment = {
            name: sanitizeHtml(input.value),
            date: new Date(),
            text: sanitizeHtml(textarea.value),
            likes: 0,
            isLiked: false,
        };

        comments.push(newComment);

        renderComments ();

        input.value = "";
        textarea.value = "";
    })

</script>
